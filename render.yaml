databases:
  - name: pingcrm-postgres
    plan: basic-256mb
    databaseName: pingcrm
    user: pingcrm
    postgresMajorVersion: "16"

services:
  - type: redis
    name: pingcrm-redis
    plan: free
    ipAllowList: []  # only accessible from Render services in this account

  - type: web
    name: pingcrm-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pingcrm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pingcrm-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: CORS_ORIGINS
        sync: false  # set to your frontend URL, e.g. https://pingcrm-frontend.onrender.com

  - type: worker
    name: pingcrm-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A worker.celery_app worker --beat --loglevel=info
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pingcrm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pingcrm-redis
          property: connectionString
      - fromGroup: pingcrm-shared

  - type: web
    name: pingcrm-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set to your backend URL, e.g. https://pingcrm-backend.onrender.com

envVarGroups:
  - name: pingcrm-shared
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
